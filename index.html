<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa Longchamps</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007AFF">
    <link rel="apple-touch-icon" href="icono.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
</head>
<body>

    <div id="buscador_container">
        <input type="text" id="buscador_input" placeholder="Buscar territorio (ej: 14) o calle...">
        <button id="buscador_btn">🔍</button>
    </div>

    <div id="mi_mapa"></div>
    <div id="cartel_ruta">
        <span id="texto_ruta"></span>
        <button id="btn_cerrar_ruta">✕</button>
    </div>

    <div id="tarjeta_info">
        <div class="tarjeta-handle"></div>
        <button id="btn_cerrar_tarjeta">✕</button>
        <div id="contenido_tarjeta"></div>
    </div>

    <button id="btn_lista_no_visitar">📋 Lista No Visitar</button>

    <div id="panel_lista">
        <div class="panel-header">
            <h2>🚫 Direcciones No Visitar</h2>
            <button id="btn_cerrar_lista">✕</button>
        </div>
        <div id="contenido_lista"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        
    </script>
</body>
</html>
